services:
  # ── Nuestra API Node.js ──────────────────────────────
  api:
    build: . # usa el Dockerfile de esta carpeta
    container_name: candidates-api
    ports:
      - "4000:4000" # host:contenedor
    env_file:
      - .env
    depends_on:
      - mongo # espera a que mongo esté listo
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - .:/app # hot reload: cambios en código = cambios en contenedor
      - /app/node_modules # excluir node_modules del volumen

  # ── MongoDB ─────────────────────────────────────────
  mongo:
    image: mongo:7 # imagen oficial de MongoDB
    container_name: candidates-mongo
    ports:
      - "27017:27017" # opcional — solo si quieres conectar desde fuera
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret
      - MONGO_INITDB_DATABASE=candidatesdb
    volumes:
      - mongo-data:/data/db # datos persisten aunque el contenedor se elimine
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network: # red interna — los servicios se ven por nombre
    driver: bridge

volumes:
  mongo-data: # volumen nombrado — datos persistentes

